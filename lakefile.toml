name = "LeanOJProblems"
version = "0.1.0"
keywords = ["math"]
defaultTargets = ["LeanOJProblems"]

[leanOptions]
pp.unicode.fun = true # pretty-prints `fun a ↦ b`
relaxedAutoImplicit = false
weak.linter.mathlibStandardSet = true
maxSynthPendingDepth = 3
weak.linter.style.longLine = true # Check that lines are not longer than 100 characters
warn.sorry = false # Don't give a warning for sorrys

[[require]]
name = "mathlib"
scope = "leanprover-community"
rev = "v4.27.0"

[[lean_lib]]
name = "LeanOJProblems"
globs = ["LeanOJProblems.*"]
